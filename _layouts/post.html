<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">    
<a href="/" class="back-link">cd ..</a>
<title>{{ page.title }}</title>

<style>

body{
    background:#0d1117;
    color:#c9d1d9;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:40px;
    line-height:1.6;
}

h1,h2,h3{
    color:#58a6ff;
}

a{
    color:#58a6ff;
}

img{
    max-width:100%;
    border-radius:6px;
    margin:20px 0;
}

code{
    background:#161b22;
    padding:3px 6px;
    border-radius:4px;
}

pre{
    background:#161b22;
    padding:16px;
    border-radius:6px;
    overflow-x:auto;
}

.thought-box{
    background:#161b22;
    border-left:4px solid #58a6ff;
    padding:16px;
    margin:20px 0;
    border-radius:6px;
}

.rule-box{
    background:#0b0f14;
    border:1px solid #30363d;
    padding:14px;
    border-radius:6px;
    margin:15px 0;
}

.goal-box{
    background:#0b0f14;
    border:1px solid #30363d;
    padding:12px;
    border-radius:6px;
}

.back-link{
    display:inline-block;
    margin-bottom:20px;
    color:#58a6ff;
    text-decoration:none;
    font-size:14px;
}

.back-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<h1>{{ page.title }}</h1>

<div class="content">
{{ content }}
</div>

<script>

/* wrap Thoughts blocks automatically */

document.querySelectorAll("p").forEach(p=>{
    if(p.innerText.startsWith("Thoughts:")){
        const box=document.createElement("div")
        box.className="thought-box"
        p.parentNode.insertBefore(box,p)
        box.appendChild(p)
    }
})

</script>

</body>
</html>
