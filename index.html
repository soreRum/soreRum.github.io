<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>gabem thoughts</title>

<style>

body {
    background: #000;
    color: #00ff9c;
    font-family: monospace;
    max-width: 800px;
    margin: auto;
    padding: 40px;
    line-height: 1.6;
}

a {
    color: #4da6ff;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.terminal {
    background: #0a0a0a;
    border: 1px solid #333;
    padding: 20px;
    margin-bottom: 40px;
}

.prompt {
    color: #00ff9c;
}

.command {
    color: #ffffff;
}

.post {
    margin-left: 20px;
}

</style>
</head>

<body>

<h1>gabem thoughts</h1>

<p>Mini writeups live here.</p>

<div class="terminal">

<span class="prompt">gabem@lab:~$</span> <span class="command">ls posts</span>

<br><br>

{% for post in site.posts %}

<div class="post">
<a href="{{ post.url }}">{{ post.title }}</a>
</div>

{% endfor %}

</div>

<h2>About</h2>

<p>
